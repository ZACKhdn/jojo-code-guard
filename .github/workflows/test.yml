# 跨平台回归验证：检查 Python、Bash、Git diff 和编码守护行为。
name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.13"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Prefer Git Bash on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value 'C:\Program Files\Git\bin'

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python scripts
        run: python -m compileall -q scripts skills/jojo-code-guard/scripts

      - name: Validate Bash hook
        shell: bash
        run: |
          bash -n hooks/session-start
          bash -n hooks/post-write-check

      - name: Check Git whitespace
        run: git diff --check

      - name: Run repository guard
        run: python skills/jojo-code-guard/scripts/check_diff.py --repo .
